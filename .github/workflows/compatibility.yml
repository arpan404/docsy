name: Compatibility Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mintlify-compat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run compatibility tests
        run: npm run test:compat

      - name: Run full test suite
        run: npx vitest run

      - name: Build
        run: npm run build
